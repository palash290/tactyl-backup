<section class="ct_login_main">
    <div class="ct_login_left_content">
        <div>
            <div class="ct_login_logo ct_mb_35 ct_cursor_pointer">
                <img routerLink="/" src="img/logo.svg" alt="">
            </div>
            <div class="text-center mx-auto ct_login_title" style="max-width: 373px;">
                <h4 class="ct_fs_44 ct_text_clr_f9f9f9 ct_mb_20 ct_ff_Matter_Light">One Login, Everything in Flow</h4>
                <p class="ct_text_clr_f9f9f9 ct_fs_18 mb-0">Everything you need to plan, prioritize, and execute – your
                    way.</p>
            </div>
        </div>
        <div class="ct_login_bottom_img mt-auto">
            <img src="img/login_bottom_img.png" alt="">
        </div>
    </div>
    <div class="ct_login_right_content">
        <div class="text-center ct_mb_30 ct_pe_90  ">
            <h2 class="ct_fs_35 ct_mb_10 ct_ff_Matter_Medium">Reset Password</h2>
            <!-- <p class="ct_text_clr_5E6168 mb-0 ct_fs_20 mx-auto" style="max-width: 499px;">Enter your registered email
                address and we'll send you a link to reset your password.</p> -->
        </div>
        <form [formGroup]="Form" class=" ct_login_scroll w-100 ct_pe_90">

            <div class="form-group ct_mb_15">
                <label for="" class="ct_fs_18 ct_mb_10">New Password</label>
                <div class="position-relative">
                    <img src="img/circum_lock.svg" alt="" class="ct_input_icon_left">
                    <input type="{{ isPasswordVisible2 ? 'text' : 'password' }}"
                        class="form-control  ct_input ct_input_ps_50 ct_input_pe_50 " placeholder="Enter password"
                        formControlName="new_password">
                    <i class="fa-regular ct_show_eye" [ngClass]="isPasswordVisible2 ? 'fa-eye' : 'fa-eye-slash' "
                        (click)="togglePasswordVisibility2()"></i>
                </div>
                <div *ngIf="Form.controls['new_password'].invalid && Form.controls['new_password'].touched"
                    class="err_msg">
                    <div *ngIf="Form.controls['new_password'].errors?.['required']" class="ct_fs_14 mt-1">
                        New password is
                        required.</div>
                </div>
            </div>
            <div class="form-group ct_mb_15">
                <label for="" class="ct_fs_18 ct_mb_10">Confirm Password</label>
                <div class="position-relative">
                    <img src="img/circum_lock.svg" alt="" class="ct_input_icon_left">
                    <input type="{{ isPasswordVisible3 ? 'text' : 'password' }}"
                        class="form-control  ct_input ct_input_ps_50 ct_input_pe_50 " placeholder="Enter password"
                        formControlName="confirm_password">
                    <i class="fa-regular ct_show_eye" [ngClass]="isPasswordVisible3 ? 'fa-eye' : 'fa-eye-slash' "
                        (click)="togglePasswordVisibility3()"></i>
                </div>
                <div *ngIf="Form.controls['confirm_password'].invalid && Form.controls['confirm_password'].touched"
                    class="err_msg">
                    <div *ngIf="Form.controls['confirm_password'].errors?.['required']" class="ct_fs_14 mt-1">
                        Confirm password is
                        required.</div>
                </div>
            </div>
            <div class="ct_mt_35">
                <a class="ct_2d_purple_btn w-100" (click)="submitForm()">Submit</a>
            </div>
            <!-- <p class="mb-0 text-center ct_fs_14 ct_mt_15">Already know your password? <a routerLink="/choose-login"
                    class="ct_text_purple ct_fw_600">Sign Up</a></p> -->
        </form>
    </div>
</section>

<div class="ct_loader_main" *ngIf="loading">
    <div class="loader-con">
        <div style="--i: 0;" class="pfile"></div>
        <div style="--i: 1;" class="pfile"></div>
        <div class="pfile" style="--i: 2;"></div>
        <div class="pfile" style="--i: 3;"></div>
        <div class="pfile" style="--i: 4;"></div>
        <div class="pfile" style="--i: 5;"></div>
    </div>
</div>
